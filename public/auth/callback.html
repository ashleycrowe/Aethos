<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aethos Authentication</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0b0f19;
        color: #e5faff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .status {
        border: 1px solid rgb(0 240 255 / 0.2);
        border-radius: 20px;
        background: rgb(255 255 255 / 0.06);
        padding: 24px;
        text-align: center;
      }

      .eyebrow {
        color: #00f0ff;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="status">
      <p class="eyebrow">Aethos Live</p>
      <p>Completing Microsoft sign-in...</p>
    </main>
  </body>
</html>
